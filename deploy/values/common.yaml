replicaCount: 1

image:
  repository: mocker
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8080

config:
  environment: development
  debug: "false"

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: mocker.example.com
      paths:
        - path: /
          pathType: Prefix

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi
