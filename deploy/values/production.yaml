replicaCount: 3

image:
  repository: registry.example.com/mocker
  pullPolicy: Always

config:
  environment: production
  debug: "false"

ingress:
  enabled: true
  className: nginx
  hosts:
    - host: mocker.example.com
      paths:
        - path: /
          pathType: Prefix

resources:
  requests:
    cpu: 200m
    memory: 256Mi
  limits:
    cpu: 1000m
    memory: 512Mi
