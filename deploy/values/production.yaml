replicaCount: 3

image:
  repository: registry.internal/mocker
  pullPolicy: Always

config:
  environment: production
  debug: "false"

ingress:
  enabled: true
  className: nginx
  host: mocker.internal

resources:
  requests:
    cpu: 200m
    memory: 256Mi
  limits:
    cpu: 1000m
    memory: 512Mi
