# custom_hints.example.yaml
#
# Copy this file and point MOCKER_CUSTOM_HINTS_PATH at it to define domain-specific
# field value sets. Mocker will pick a random value from the list whenever a field
# name contains the pattern (case-insensitive substring match).
#
# Priority: schema enum > custom hints > built-in faker hints > type fallback
#
# The reserved key `apps` holds per-app overrides. App-specific hints win over
# global hints for the same pattern. The `apps` key itself never matches a field.

# --- global (apply to all apps) ---

status:
  - active
  - inactive
  - pending

environment:
  - prod
  - staging
  - dev

tier:
  - gold
  - silver
  - bronze

# --- per-app overrides ---

apps:
  payment-gateway:
    status:
      - processing
      - settled
      - failed

  order-service:
    status:
      - placed
      - shipped
      - delivered
